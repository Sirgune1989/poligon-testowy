<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edytor content.json | Za Jeziorem</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #5b6472;
      --line: #d7dce3;
      --brand: #1f4334;
      --brand-soft: #dce8e2;
      --radius: 14px;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
    }

    .container {
      width: min(1200px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }

    .header {
      margin-bottom: 1.5rem;
      padding: 1.4rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.5rem, 2vw, 2rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-top: 1rem;
    }

    .file-input {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .file-input input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .sections {
      display: grid;
      gap: 1rem;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section__head {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--line);
      background: #f9fbfc;
    }

    .section__head h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .section__body {
      padding: 1rem;
      display: grid;
      gap: 0.9rem;
    }

    .field {
      display: grid;
      gap: 0.4rem;
    }

    .field label {
      font-size: 0.9rem;
      color: #374151;
      font-weight: 600;
      word-break: break-word;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid #cfd6df;
      border-radius: 10px;
      padding: 0.7rem 0.8rem;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .field textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    .footer {
      position: sticky;
      bottom: 0;
      margin-top: 1rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .save-btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #255343);
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .save-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .hint {
      margin: 0.65rem 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .pill {
      display: inline-flex;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: var(--brand-soft);
      color: #254a3b;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Generator JSON <span class="pill">Za Jeziorem</span></h1>
      <p class="subtitle">
        Wczytaj aktualny <code>content.json</code>, edytuj pola tekstowe i ścieżki zdjęć, a następnie pobierz gotowy plik.
      </p>
      <div class="toolbar">
        <label class="file-input">
          Wczytaj obecny plik
          <input id="json-file" type="file" accept=".json,application/json">
        </label>
        <span class="status" id="status">Brak wczytanego pliku. Możesz zacząć od wybrania content.json.</span>
      </div>
    </header>

    <main id="sections" class="sections"></main>

    <footer class="footer">
      <button id="download-btn" class="save-btn" type="button">
        Zapisz zmiany (Pobierz content.json)
      </button>
      <p class="hint">Generator zachowuje strukturę obiektu i typy danych z wczytanego pliku.</p>
    </footer>
  </div>

  <script>
    const fileInput = document.getElementById("json-file");
    const statusEl = document.getElementById("status");
    const sectionsRoot = document.getElementById("sections");
    const downloadBtn = document.getElementById("download-btn");

    let sourceData = null;

    const sectionNames = {
      site: "Site",
      booking: "Booking",
      hero: "Hero",
      proof: "Proof",
      experience: "Experience",
      intro: "Intro",
      offer: "Oferta",
      rooms: "Pokoje",
      events: "Przyjęcia",
      conference: "Konferencje",
      nature: "Okolica",
      gallery: "Galeria",
      reviews: "Opinie",
      faq: "FAQ",
      cta: "CTA",
      location: "Lokalizacja i Atrakcje",
      contact: "Kontakt",
      footer: "Footer"
    };

    function parsePath(path) {
      const tokens = [];
      const regex = /([^[.\]]+)|\[(\d+)\]/g;
      let match;
      while ((match = regex.exec(path)) !== null) {
        tokens.push(match[1] !== undefined ? match[1] : Number(match[2]));
      }
      return tokens;
    }

    function setByPath(target, path, value) {
      const tokens = parsePath(path);
      let current = target;
      for (let i = 0; i < tokens.length - 1; i += 1) {
        current = current[tokens[i]];
      }
      current[tokens[tokens.length - 1]] = value;
    }

    function getLeafFields(node, basePath = "") {
      const fields = [];
      if (Array.isArray(node)) {
        node.forEach((item, index) => {
          const nextPath = `${basePath}[${index}]`;
          fields.push(...getLeafFields(item, nextPath));
        });
        return fields;
      }

      if (node && typeof node === "object") {
        Object.keys(node).forEach((key) => {
          const nextPath = basePath ? `${basePath}.${key}` : key;
          fields.push(...getLeafFields(node[key], nextPath));
        });
        return fields;
      }

      fields.push({
        path: basePath,
        value: node,
        type: node === null ? "null" : typeof node
      });
      return fields;
    }

    function shouldUseTextarea(path, value) {
      if (typeof value !== "string") {
        return false;
      }
      return value.length > 85 || /(text|lead|description|note|caption|answer|message)$/i.test(path);
    }

    function prettyLabel(fullPath) {
      return fullPath
        .replace(/\.(\d+)/g, " [$1]")
        .replace(/\[(\d+)\]/g, " [$1]")
        .replace(/\./g, " > ");
    }

    function fieldToInput(field) {
      const wrapper = document.createElement("div");
      wrapper.className = "field";

      const label = document.createElement("label");
      label.setAttribute("for", `field-${field.path}`);
      label.textContent = prettyLabel(field.path);
      wrapper.appendChild(label);

      let control;
      if (field.type === "boolean") {
        control = document.createElement("select");
        control.innerHTML = `
          <option value="true">true</option>
          <option value="false">false</option>
        `;
        control.value = String(field.value);
      } else if (shouldUseTextarea(field.path, field.value)) {
        control = document.createElement("textarea");
        control.value = field.value === null ? "" : String(field.value);
      } else {
        control = document.createElement("input");
        control.type = field.type === "number" ? "number" : "text";
        control.value = field.value === null ? "" : String(field.value);
      }

      control.id = `field-${field.path}`;
      control.dataset.path = field.path;
      control.dataset.type = field.type;
      wrapper.appendChild(control);
      return wrapper;
    }

    function renderEditor(data) {
      const leafFields = getLeafFields(data);
      const groups = {};

      leafFields.forEach((field) => {
        const topKey = field.path.split(".")[0].split("[")[0];
        if (!groups[topKey]) {
          groups[topKey] = [];
        }
        groups[topKey].push(field);
      });

      sectionsRoot.innerHTML = "";

      Object.keys(groups).forEach((topKey) => {
        const section = document.createElement("section");
        section.className = "section";

        const head = document.createElement("div");
        head.className = "section__head";
        const title = document.createElement("h2");
        title.textContent = sectionNames[topKey] || topKey;
        head.appendChild(title);

        const body = document.createElement("div");
        body.className = "section__body";
        groups[topKey].forEach((field) => {
          body.appendChild(fieldToInput(field));
        });

        section.appendChild(head);
        section.appendChild(body);
        sectionsRoot.appendChild(section);
      });
    }

    function coerceValue(raw, type) {
      if (type === "number") {
        const parsed = Number(raw);
        return Number.isNaN(parsed) ? 0 : parsed;
      }
      if (type === "boolean") {
        return raw === "true";
      }
      if (type === "null") {
        return raw === "" ? null : raw;
      }
      return raw;
    }

    function buildOutputData() {
      if (!sourceData) {
        return null;
      }

      const output = JSON.parse(JSON.stringify(sourceData));
      const controls = sectionsRoot.querySelectorAll("[data-path]");

      controls.forEach((control) => {
        const path = control.dataset.path;
        const type = control.dataset.type || "string";
        const raw = control.value;
        const value = coerceValue(raw, type);
        setByPath(output, path, value);
      });

      return output;
    }

    function triggerDownload(jsonString) {
      const blob = new Blob([jsonString], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "content.json";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "#a61e1e" : "var(--muted)";
    }

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }

      try {
        const text = await file.text();
        const data = JSON.parse(text);
        sourceData = data;
        renderEditor(sourceData);
        setStatus(`Wczytano plik: ${file.name}`);
      } catch (error) {
        setStatus("Nie udało się odczytać JSON. Sprawdź poprawność pliku.", true);
      }
    });

    downloadBtn.addEventListener("click", () => {
      if (!sourceData) {
        setStatus("Najpierw wczytaj plik content.json, aby móc zapisać zmiany.", true);
        return;
      }

      const outputData = buildOutputData();
      const jsonString = JSON.stringify(outputData, null, 2);
      triggerDownload(jsonString);
      setStatus("Gotowe. Nowy content.json został pobrany.");
    });
  </script>
</body>
</html>
